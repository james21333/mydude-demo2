<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dude 3D — Live Scene Builder</title>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/"
    }
  }
  </script>

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #060a12;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #e2e8f0;
    }

    #three-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
    }

    /* ── Top bar ── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 52px;
      display: flex;
      align-items: center;
      padding: 0 16px;
      background: rgba(6,10,18,0.75);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      z-index: 200;
      gap: 12px;
    }

    .logo {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.14em;
      color: #7dd3fc;
      text-transform: uppercase;
      user-select: none;
    }

    .topbar-sep { flex: 1; }

    .status-pill {
      padding: 4px 11px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      border: 1px solid rgba(255,255,255,0.12);
      color: #64748b;
      background: rgba(255,255,255,0.04);
      transition: all 0.2s;
    }
    .status-pill.listening  { border-color: #22c55e44; color: #4ade80; background: rgba(34,197,94,0.08); }
    .status-pill.speaking   { border-color: #38bdf844; color: #38bdf8; background: rgba(56,189,248,0.08); }
    .status-pill.building   { border-color: #a78bfa44; color: #a78bfa; background: rgba(167,139,250,0.08); }
    .status-pill.connecting { border-color: #fb923c44; color: #fb923c; background: rgba(251,146,60,0.08); }

    /* ── Panel toggle ── */
    #panel-toggle {
      position: fixed;
      right: 0; top: 50%;
      transform: translateY(-50%);
      width: 28px; height: 56px;
      background: rgba(6,10,18,0.85);
      border: 1px solid rgba(255,255,255,0.08);
      border-right: none;
      border-radius: 6px 0 0 6px;
      color: #64748b;
      font-size: 14px;
      cursor: pointer;
      z-index: 201;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, background 0.2s;
    }
    #panel-toggle:hover { color: #7dd3fc; background: rgba(6,10,18,0.95); }

    /* ── Side panel ── */
    .side-panel {
      position: fixed;
      right: 0; top: 52px; bottom: 0;
      width: 360px;
      background: rgba(6,10,18,0.94);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-left: 1px solid rgba(255,255,255,0.07);
      z-index: 200;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.28s cubic-bezier(0.4,0,0.2,1);
    }
    .side-panel.open { transform: translateX(0); }

    .tab-bar {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 11px 4px;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: #475569;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .tab-btn:hover { color: #94a3b8; }
    .tab-btn.active { color: #7dd3fc; border-bottom-color: #7dd3fc; }

    .tab-pane {
      display: none;
      flex: 1;
      flex-direction: column;
      overflow: hidden;
      padding: 12px;
      gap: 8px;
    }
    .tab-pane.active { display: flex; }

    .pane-label {
      font-size: 10px;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      flex-shrink: 0;
    }

    textarea {
      flex: 1;
      min-height: 0;
      width: 100%;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      color: #cbd5e1;
      font-size: 10.5px;
      font-family: 'SF Mono', 'Monaco', 'Menlo', 'Consolas', monospace;
      line-height: 1.5;
      padding: 10px;
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus { border-color: rgba(125,211,252,0.3); }
    textarea[readonly] { color: #64748b; }

    .btn-row { display: flex; gap: 6px; flex-shrink: 0; }

    button.btn-primary {
      flex: 1;
      padding: 8px 14px;
      background: #0ea5e9;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.btn-primary:hover { background: #38bdf8; }

    button.btn-secondary {
      flex: 1;
      padding: 8px 10px;
      background: rgba(255,255,255,0.05);
      color: #64748b;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    button.btn-secondary:hover { background: rgba(255,255,255,0.09); color: #94a3b8; }

    button.btn-danger {
      flex: 1;
      padding: 8px 10px;
      background: rgba(239,68,68,0.1);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button.btn-danger:hover { background: rgba(239,68,68,0.18); }

    .error-msg {
      font-size: 10.5px;
      color: #f87171;
      display: none;
      padding: 6px 8px;
      background: rgba(239,68,68,0.08);
      border: 1px solid rgba(239,68,68,0.15);
      border-radius: 4px;
      flex-shrink: 0;
    }

    /* ── Scene info (bottom-left) ── */
    .scene-info {
      position: fixed;
      bottom: 90px;
      left: 16px;
      background: rgba(6,10,18,0.72);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 10px;
      color: #475569;
      z-index: 100;
      pointer-events: none;
    }

    /* ── Message overlay ── */
    #msg {
      position: fixed;
      top: 68px;
      left: 50%;
      transform: translateX(-50%);
      max-width: 560px;
      width: calc(100vw - 48px);
      background: rgba(6,10,18,0.82);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 12px;
      color: #94a3b8;
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s;
      z-index: 150;
      line-height: 1.5;
    }
    #msg.show { opacity: 1; }

    /* ── Bottom bar ── */
    .bottombar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0 24px;
      z-index: 100;
    }

    #mic-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 28px;
      height: 50px;
      background: rgba(14,165,233,0.12);
      border: 1.5px solid rgba(14,165,233,0.35);
      border-radius: 25px;
      color: #38bdf8;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 140px;
      justify-content: center;
    }
    #mic-btn:hover { background: rgba(14,165,233,0.2); border-color: rgba(56,189,248,0.5); }
    #mic-btn.active {
      background: rgba(239,68,68,0.12);
      border-color: rgba(239,68,68,0.4);
      color: #f87171;
    }

    #mic-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* ── Typed input ── */
    #typed-input {
      height: 50px;
      flex: 1;
      max-width: 480px;
      padding: 0 16px;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 25px;
      color: #e2e8f0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }
    #typed-input::placeholder { color: #475569; }
    #typed-input:focus { border-color: rgba(125,211,252,0.3); }

    #send-btn {
      height: 50px;
      width: 50px;
      background: rgba(14,165,233,0.15);
      border: 1.5px solid rgba(14,165,233,0.3);
      border-radius: 50%;
      color: #38bdf8;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    #send-btn:hover { background: rgba(14,165,233,0.28); }
  </style>
</head>
<body>

<canvas id="three-canvas"></canvas>

<!-- Top bar -->
<div class="topbar">
  <span class="logo">✦ My Dude 3D</span>
  <span class="topbar-sep"></span>
  <span class="status-pill" id="status-pill">IDLE</span>
</div>

<!-- Panel toggle -->
<button id="panel-toggle" onclick="togglePanel()">⚙</button>

<!-- Side panel -->
<div class="side-panel" id="side-panel">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('prompt')">LLM Prompt</button>
    <button class="tab-btn" onclick="switchTab('json')">Scene JSON</button>
    <button class="tab-btn" onclick="switchTab('state')">State</button>
  </div>

  <!-- Prompt tab -->
  <div class="tab-pane active" id="tab-prompt">
    <p class="pane-label">Copy this system prompt to your LLM</p>
    <textarea id="prompt-display" readonly></textarea>
    <div class="btn-row">
      <button class="btn-primary" id="copy-btn" onclick="copyPrompt()">Copy Prompt</button>
    </div>
  </div>

  <!-- JSON tab -->
  <div class="tab-pane" id="tab-json">
    <p class="pane-label">Paste LLM JSON array — or type commands directly</p>
    <textarea id="json-input" placeholder='[{"id":"obj1","assetPath":"/assets/kenney/characters/knight.glb","action":"add","position":{"x":0,"y":0,"z":0},"rotation":{"x":0,"y":0,"z":0},"scale":{"x":1,"y":1,"z":1}}]'></textarea>
    <div class="btn-row">
      <button class="btn-primary" onclick="executeJsonInput()">Execute</button>
      <button class="btn-danger"  onclick="clearSceneUI()">Clear Scene</button>
    </div>
    <div class="error-msg" id="json-error"></div>
  </div>

  <!-- State tab -->
  <div class="tab-pane" id="tab-state">
    <p class="pane-label">Current scene — auto-saved to localStorage</p>
    <textarea id="state-display" readonly></textarea>
    <div class="btn-row">
      <button class="btn-secondary" onclick="exportScene()">Export JSON</button>
      <button class="btn-danger"    onclick="clearStorageUI()">Clear Storage</button>
    </div>
  </div>
</div>

<!-- Scene info -->
<div class="scene-info" id="scene-info">0 objects</div>

<!-- Message -->
<div id="msg"></div>

<!-- Bottom controls -->
<div class="bottombar">
  <button id="mic-btn" onclick="toggleMic()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="9" y="2" width="6" height="12" rx="3"/>
      <path d="M5 10a7 7 0 0 0 14 0"/>
      <line x1="12" y1="19" x2="12" y2="22"/>
      <line x1="8"  y1="22" x2="16" y2="22"/>
    </svg>
    <span id="mic-label">Start</span>
  </button>

  <input id="typed-input" placeholder="Type a scene command…" onkeydown="onTypedKey(event)">
  <button id="send-btn" onclick="sendTyped()" title="Send">↑</button>
</div>


<script type="module" src="/app.js"></script>
</body>
</html>
