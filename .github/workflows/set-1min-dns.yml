name: Set 1min.to DNS for Pages

on:
  workflow_dispatch:

jobs:
  dns:
    runs-on: ubuntu-latest
    steps:
      - name: Create CNAMEs to onemin-to.pages.dev
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          ZONE_ID=$(curl -sS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/zones?name=1min.to" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print((d.get('result') or [{}])[0].get('id',''))")
          echo "ZONE_ID=${ZONE_ID}"
          test -n "$ZONE_ID"

          upsert() {
            local name="$1"
            local content="$2"
            local existing
            existing=$(curl -sS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?type=CNAME&name=${name}" \
              | python3 -c "import sys,json; d=json.load(sys.stdin); r=d.get('result') or []; print(r[0]['id'] if r else '')")
            body=$(python3 -c "import json; print(json.dumps({'type':'CNAME','name':'''$name''','content':'''$content''','proxied':True,'ttl':1}))")
            if [[ -n "$existing" ]]; then
              echo "Updating $name ($existing)"
              curl -sS -X PUT -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json" \
                "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records/${existing}" \
                --data "$body" | python3 -c "import sys,json; d=json.load(sys.stdin); print('success',d.get('success'), d.get('errors')); print(d.get('result',{}).get('name'), '->', d.get('result',{}).get('content'))"
            else
              echo "Creating $name"
              curl -sS -X POST -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" -H "Content-Type: application/json" \
                "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records" \
                --data "$body" | python3 -c "import sys,json; d=json.load(sys.stdin); print('success',d.get('success'), d.get('errors')); print(d.get('result',{}).get('name'), '->', d.get('result',{}).get('content'))"
            fi
          }

          upsert "1min.to" "onemin-to.pages.dev"
          upsert "www.1min.to" "onemin-to.pages.dev"

          echo "Listing CNAMEs:"
          curl -sS -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/zones/${ZONE_ID}/dns_records?per_page=50" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('success',d.get('success'),'errors',d.get('errors'));
[print(r['type'], r['name'], '->', r['content'], 'proxied=', r.get('proxied')) for r in d.get('result') or []]"
