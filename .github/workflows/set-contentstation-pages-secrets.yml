name: Set Content Station Pages secrets

# One-shot / on-demand: push env vars to Cloudflare Pages project mimi-pipo (production).
# Requires CLOUDFLARE_API_TOKEN with Account → Cloudflare Pages → Edit.

on:
  workflow_dispatch:

concurrency:
  group: set-contentstation-pages-secrets
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  set-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Install wrangler
        run: npm install --global wrangler@4.110.0

      - name: Probe Pages API access
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -euo pipefail
          echo "Probing pages project mimi-pipo (no secret values)..."
          HTTP=$(curl -sS -o /tmp/cf-proj.json -w "%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects/mimi-pipo")
          echo "HTTP $HTTP"
          python3 - <<'PY'
          import json
          d=json.load(open('/tmp/cf-proj.json'))
          print('success=', d.get('success'))
          print('errors=', d.get('errors'))
          r=d.get('result') or {}
          print('project=', r.get('name'))
          print('subdomain=', r.get('subdomain'))
          PY
          if [ "$HTTP" != "200" ]; then
            echo "::error::Pages API not accessible with current CLOUDFLARE_API_TOKEN (need Pages Edit)."
            exit 1
          fi

      - name: Put production secrets via wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CONTENT_STATION_PASSWORD: ${{ secrets.CONTENT_STATION_PASSWORD }}
          CONTENT_STATION_SESSION_SECRET: ${{ secrets.CONTENT_STATION_SESSION_SECRET }}
          GHOSTCUT_APP_KEY: ${{ secrets.GHOSTCUT_APP_KEY }}
          GHOSTCUT_APP_SECRET: ${{ secrets.GHOSTCUT_APP_SECRET }}
          GHOSTCUT_ACCOUNT_NAME: ${{ secrets.GHOSTCUT_ACCOUNT_NAME }}
          GHOSTCUT_ACCOUNT_ID: ${{ secrets.GHOSTCUT_ACCOUNT_ID }}
          GHOSTCUT_ACCOUNT_EMAIL: ${{ secrets.GHOSTCUT_ACCOUNT_EMAIL }}
          GHOSTCUT_API_BASE: ${{ secrets.GHOSTCUT_API_BASE }}
        run: |
          set -euo pipefail
          put() {
            local name="$1"
            local value="$2"
            if [ -z "$value" ]; then
              echo "skip $name (empty)"
              return 0
            fi
            printf '%s' "$value" | wrangler pages secret put "$name" \
              --project-name=mimi-pipo \
              --env production
            echo "ok $name (len=${#value})"
          }
          put CONTENT_STATION_PASSWORD "$CONTENT_STATION_PASSWORD"
          put CONTENT_STATION_SESSION_SECRET "$CONTENT_STATION_SESSION_SECRET"
          put GHOSTCUT_APP_KEY "$GHOSTCUT_APP_KEY"
          put GHOSTCUT_APP_SECRET "$GHOSTCUT_APP_SECRET"
          put GHOSTCUT_ACCOUNT_NAME "$GHOSTCUT_ACCOUNT_NAME"
          put GHOSTCUT_ACCOUNT_ID "$GHOSTCUT_ACCOUNT_ID"
          put GHOSTCUT_ACCOUNT_EMAIL "$GHOSTCUT_ACCOUNT_EMAIL"
          put GHOSTCUT_API_BASE "$GHOSTCUT_API_BASE"
          echo "All secret puts attempted."
